name: Bug
description: Report a bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Level of priority of the bug
      options:
        - P0 - CRITICAL
        - P1 – HIGH
        - P2 – MEDIUM
        - P3 – LOW
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Issue
      description: Describe what is not working, provide screenshots if needed
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce bug
      description: 1) ... 2) ... 3) ...
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Your device type, browser, version, ...
  - type: checkboxes
    id: confirmation
    attributes:
      label: Verifications
      description: Please confirm the following checks
      options:
        - label: I searched existing tickets and this bug has not been reported yet.
          required: true
